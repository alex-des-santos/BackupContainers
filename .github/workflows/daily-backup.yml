# Backup diário de configurações Docker da VPS para este repositório.
# Requer: script instalado na VPS em /usr/local/bin/backup-docker-configs.sh
# e secrets VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_KNOWN_HOSTS.
name: daily-vps-config-backup

on:
  workflow_dispatch:
  schedule:
    # UTC. 06:15 UTC = 03:15 BRT (Brasil, UTC-3). Ajuste conforme seu fuso.
    - cron: "15 6 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      # Checkout para poder fazer commit do tarball em backups/
      - name: Checkout repositório
        uses: actions/checkout@v4

      # Monta a chave privada e o known_hosts a partir dos secrets
      - name: Configurar SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$VPS_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # Roda o script na VPS (gera o tarball) e baixa o arquivo para backups/
      - name: Executar backup na VPS e baixar tarball
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          PORT="${VPS_SSH_PORT:-22}"
          
          # Validate port value
          if ! [[ "$PORT" =~ ^[0-9]+$ ]]; then
            echo "ERRO: VPS_SSH_PORT deve ser numérico. Valor recebido: '$PORT'"
            exit 1
          fi
          
          if [ "$PORT" -lt 1 ] || [ "$PORT" -gt 65535 ]; then
            echo "ERRO: VPS_SSH_PORT deve estar no range 1-65535. Valor recebido: $PORT"
            exit 1
          fi
          
          DATE="$(date -u +%F)"
          mkdir -p backups

          echo "Conectando à VPS ${VPS_HOST}:${PORT}..."
          REMOTE=$(ssh -p "$PORT" "${VPS_USER}@${VPS_HOST}" \
            "sudo BACKUP_OUTPUT_DIR=/var/backups/docker-configs BACKUP_EXCLUDE_ENV=1 /usr/local/bin/backup-docker-configs.sh" \
            2>&1 | tail -1)

          echo "Tarball remoto: $REMOTE"

          if [[ -n "$REMOTE" && "$REMOTE" == *.tar.gz ]]; then
            # SCP retry logic: max 3 attempts with 5-second delay
            MAX_ATTEMPTS=3
            RETRY_DELAY=5
            ATTEMPT=1
            SCP_SUCCESS=0
            
            while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
              echo "Tentativa $ATTEMPT de $MAX_ATTEMPTS: baixando backup via SCP..."
              
              # Capture SCP output and error
              SCP_OUTPUT=$(scp -P "$PORT" "${VPS_USER}@${VPS_HOST}:${REMOTE}" "backups/${DATE}.tar.gz" 2>&1)
              SCP_EXIT_CODE=$?
              
              if [ $SCP_EXIT_CODE -eq 0 ]; then
                echo "Backup baixado com sucesso:"
                ls -lh "backups/${DATE}.tar.gz"
                SCP_SUCCESS=1
                break
              else
                # Analyze error type
                ERROR_TYPE="desconhecido"
                if echo "$SCP_OUTPUT" | grep -qi "timeout\|timed out\|connection timed out"; then
                  ERROR_TYPE="timeout de rede"
                elif echo "$SCP_OUTPUT" | grep -qi "permission denied\|insufficient permissions"; then
                  ERROR_TYPE="permissões insuficientes"
                elif echo "$SCP_OUTPUT" | grep -qi "no space left\|disk full\|quota exceeded"; then
                  ERROR_TYPE="espaço em disco insuficiente"
                fi
                
                echo "ERRO na tentativa $ATTEMPT: SCP falhou com código $SCP_EXIT_CODE"
                echo "Tipo de erro detectado: $ERROR_TYPE"
                echo "Detalhes: $SCP_OUTPUT"
                
                if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                  echo "Aguardando $RETRY_DELAY segundos antes da próxima tentativa..."
                  sleep $RETRY_DELAY
                fi
              fi
              
              ATTEMPT=$((ATTEMPT + 1))
            done
            
            if [ $SCP_SUCCESS -eq 0 ]; then
              echo "ERRO: Falha ao baixar backup após $MAX_ATTEMPTS tentativas"
              echo "Causa específica da falha: $ERROR_TYPE"
              echo "Detalhes do último erro: $SCP_OUTPUT"
              exit 1
            fi
          else
            echo "ERRO: Tarball não encontrado ou caminho inválido: '$REMOTE'"
            exit 1
          fi

      # Persiste o backup no repositório (commit + push)
      - name: Commit e push do backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "backup: $(date -u +%F)"
          
          # Pull with rebase to sync branch before pushing
          echo "Sincronizando branch com git pull --rebase..."
          if ! git pull --rebase origin main 2>&1; then
            # Check if there are conflicts after rebase
            if git status | grep -q "rebase in progress\|You have unmerged paths\|Unmerged paths"; then
              echo "ERRO: Conflitos detectados após git pull --rebase"
              echo "Intervenção manual necessária para resolver conflitos"
              echo "Execute os seguintes comandos localmente:"
              echo "  1. git pull --rebase origin main"
              echo "  2. Resolva os conflitos manualmente"
              echo "  3. git rebase --continue"
              echo "  4. git push"
              git rebase --abort 2>/dev/null || true
              exit 1
            else
              echo "ERRO: Falha ao executar git pull --rebase"
              echo "Verifique problemas de autenticação ou conectividade"
              exit 1
            fi
          fi
          
          echo "Branch sincronizado com sucesso, executando git push..."
          git push
